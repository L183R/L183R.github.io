<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pantalla arcade retro para seleccionar clasificaciones y repositorios de L183R." />
  <title>L183R | Repo Arcade</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <audio id="background-music" src="Cuatro Sombras Verdes.mp3" preload="auto" autoplay loop></audio>

  <main class="arcade-page">
    <section class="arcade-screen" aria-labelledby="screen-title">
      <div class="crt-frame" aria-live="polite">
        <div class="screen-grid" id="stage-map"></div>

        <header class="arcade-hud">
          <span id="arcade-status">CREDITS 0</span>
          <span id="fighter-stage">BOOT 1989</span>
          <span>REPOS <strong id="total-counter">00</strong></span>
        </header>

        <div class="arcade-overlay">
          <p class="eyebrow">L183R repo arcade</p>
          <h1 id="screen-title">Mi repo</h1>
          <p class="arcade-overlay__subtitle" id="screen-subtitle">L183R</p>
          <p class="arcade-overlay__prompt" id="screen-prompt">Push Enter</p>
          <p class="arcade-overlay__copyright" id="screen-copyright">(r) L183R - 1984</p>
        </div>

        <div class="fighter-select__content">
          <p class="eyebrow" id="menu-label">Insert coin</p>
          <h2 id="fighter-title">Credits 0</h2>
          <p id="fighter-description" class="fighter-select__description">Pulsa Enter para iniciar.</p>
          <div class="character-carousel" aria-label="Selector de personajes">
            <button class="carousel-arrow carousel-arrow--prev" id="character-prev" type="button" aria-label="Personaje anterior">‹</button>
            <div id="fighter-roster" class="fighter-roster"></div>
            <button class="carousel-arrow carousel-arrow--next" id="character-next" type="button" aria-label="Personaje siguiente">›</button>
          </div>
        </div>

        <button class="music-button" id="music-toggle" type="button" aria-pressed="false">♫ Música</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
